name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    tags: ["v*.*.*"]

concurrency:
  group: ci__${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: torqit/pimcore-azure-provisioning

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint Bicep files
        run: |
          BICEP_VERSION="0.36.1"
          curl -sLo /tmp/bicep "https://github.com/Azure/bicep/releases/download/v${BICEP_VERSION}/bicep-linux-x64"
          chmod +x /tmp/bicep
          errors=0
          while IFS= read -r -d '' file; do
            if ! output=$(/tmp/bicep lint "$file" 2>&1); then
              echo "Bicep lint error in $file:"
              echo "$output"
              errors=$((errors+1))
            fi
          done < <(find . -type f -name '*.bicep' -print0)
          if [ "$errors" -ne 0 ]; then
            echo "$errors Bicep file(s) have lint errors"
            exit 1
          fi

      - name: Run Checkov SAST scan
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        env:
          CHECKOV_OUTPUT_CODE_LINE_LIMIT: 1000
        with:
          directory: bicep
          framework: bicep
          output_format: cli
          soft_fail: false

      - name: Set up Docker
        uses: TorqIT/pimcore-github-actions-workflows/.github/actions/setup-docker@v7
        with:
          CONTAINER_REGISTRY: ${{ env.REGISTRY }}
          CONTAINER_REGISTRY_USERNAME: ${{ github.actor }}
          CONTAINER_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build Azure image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # v0.36.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          severity: "CRITICAL,HIGH"

      - name: Push Azure image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  skeleton-ci:
    name: "Build and test Azure image against Pimcore skeleton"
    if: ${{ github.event_name == 'pull_request' }}
    strategy:
      matrix:
        include:
          - version: 2025.x
            skeleton_ref: skeleton/recipes # TODO changeme back to 2025.x
          - version: 2026.x
            skeleton_ref: skeleton/recipes-2026.x # TODO changeme back to 2026.x
    uses: ./.github/workflows/meta-ci-skeleton.yml
    with:
      VERSION: ${{ matrix.version }}
      SKELETON_REF: ${{ matrix.skeleton_ref }}
      SERVICE_PRINCIPAL_ID: ${{ vars.SERVICE_PRINCIPAL_ID }}
    secrets:
      SERVICE_PRINCIPAL_PASSWORD: ${{ secrets.SERVICE_PRINCIPAL_PASSWORD }}
      PIMCORE_ENCRYPTION_SECRET: ${{ secrets.PIMCORE_ENCRYPTION_SECRET }}
      PIMCORE_PRODUCT_KEY: ${{ secrets.PIMCORE_PRODUCT_KEY }}
      PIMCORE_INSTANCE_IDENTIFIER: ${{ secrets.PIMCORE_INSTANCE_IDENTIFIER }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}

  update-major-release-tag:
    name: Update major release tag
    if: github.event_name == 'release'
    needs: [CI]
    uses: TorqIT/github-actions-workflows/.github/workflows/update-major-release-tag.yml@v1
