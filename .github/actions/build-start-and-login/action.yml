name: ''
description: ''
inputs:
  BUILD_IMAGE:
    required: false
    description: "Whether to build the image first"
    default: "false"
  PARAMETERS_FILE:
    required: true
    description: "Path to the parameters file containing parameters for provisioning the Azure environment"
  SERVICE_PRINCIPAL_ID:
    required: true
    description: "Azure Service Principal ID with permissions to deploy resources to the target subscription and resource group"
  SERVICE_PRINCIPAL_PASSWORD:
    required: true
    description: "Azure Service Principal password"

runs:
  using: "composite"
  steps:
    - name: Build image
      if: inputs.BUILD_IMAGE == 'true'
      shell: bash
      run: |
        current_dir=$(pwd)
        cd ${{ github.workspace }}
        docker build \
          -t ghcr.io/torqit/pimcore-azure-provisioning:support-2026.x \
          .
        cd $current_dir

    - name: Start container
      shell: bash
      run: |
        docker run -d \
          --name azure \
          --volume "$(realpath "${{ inputs.PARAMETERS_FILE }}")":/azure/parameters.json \
          --volume /var/run/docker.sock:/var/run/docker.sock:ro \
          ghcr.io/torqit/pimcore-azure-provisioning:2

    - name: Log in to Azure via service principal
      shell: bash
      run: |
        docker exec azure bash -c '
          az login --tenant $(jq -r ".parameters.tenantId.value" /azure/parameters.json) \
            --service-principal \
              --username ${{ inputs.SERVICE_PRINCIPAL_ID }} \
              --password ${{ inputs.SERVICE_PRINCIPAL_PASSWORD }}
        '